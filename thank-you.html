<!DOCTYPE html>
<html>
<head>
  <title>Thank You Edah! ❤️</title>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(145deg, #fce4ec 0%, #f8bbd0 100%);
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .thank-you {
      background: white;
      padding: 3rem;
      border-radius: 48px;
      box-shadow: 0 30px 60px rgba(183, 28, 28, 0.2);
      max-width: 500px;
    }
    h1 { color: #880e4f; font-size: 3rem; }
    .heart { font-size: 4rem; animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    p { color: #4a0024; font-size: 1.2rem; margin: 1.5rem 0; }
  </style>
</head>
<body>
  <div class="thank-you">
    <div class="heart">❤️</div>
    <h1>Thank You, Edah! 💕</h1>
    <p>Your message made my heart dance! 💃</p>
    <p>I'll check my email and reply soon!</p>
    <p style="font-size: 2rem;">😍</p>
  </div>
</body>
</html>
